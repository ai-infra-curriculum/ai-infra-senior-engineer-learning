name: Validate Code and Content

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-python:
    name: Validate Python Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort mypy pytest pytest-cov
          # Find and install all requirements.txt files
          find . -name "requirements.txt" -type f -exec pip install -r {} \;

      - name: Run Black formatter check
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Run isort import checker
        run: |
          isort --check-only --diff .
        continue-on-error: true

      - name: Run Flake8 linter
        run: |
          # E501: line too long (we'll be lenient on this for educational code)
          # W503: line break before binary operator (black style)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --ignore=E501,W503

      - name: Run Pylint
        run: |
          # Run pylint on all Python files, but don't fail the build
          find . -name "*.py" -not -path "*/venv/*" -not -path "*/.venv/*" | xargs pylint --exit-zero --rcfile=.pylintrc || true
        continue-on-error: true

      - name: Type check with mypy
        run: |
          # Type checking for code stubs
          find . -name "*.py" -not -path "*/venv/*" -not -path "*/.venv/*" | xargs mypy --ignore-missing-imports --check-untyped-defs || true
        continue-on-error: true

      - name: Run pytest on code stubs
        run: |
          # Run tests if they exist
          pytest --verbose --cov=. --cov-report=xml --cov-report=term || echo "No tests found or tests skipped"
        continue-on-error: true

  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML syntax
        run: |
          # Find all YAML files and validate them
          find . -name "*.yaml" -o -name "*.yml" | xargs yamllint -c .yamllint.yml || true
        continue-on-error: true

      - name: Validate Kubernetes manifests
        run: |
          # Install kubeval for K8s manifest validation
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin
          # Validate all K8s manifests
          find . -path "*/kubernetes/*.yaml" -exec kubeval --strict {} \; || echo "Validation warnings found"
        continue-on-error: true

  validate-markdown:
    name: Validate Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore venv || true
        continue-on-error: true

      - name: Check for broken links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

  validate-shell:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          find . -name "*.sh" -type f -exec shellcheck {} \; || true
        continue-on-error: true

  validate-dockerfiles:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          find . -name "Dockerfile*" -type f -exec hadolint {} \; || true
        continue-on-error: true

  check-code-quality:
    name: Check Code Quality Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install radon for complexity analysis
        run: pip install radon

      - name: Check cyclomatic complexity
        run: |
          radon cc . -a -nb || true
        continue-on-error: true

      - name: Check maintainability index
        run: |
          radon mi . -nb || true
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install bandit for security checks
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || true
        continue-on-error: true

      - name: Run safety check for dependencies
        run: |
          pip install safety
          find . -name "requirements.txt" -type f -exec safety check -r {} \; || true
        continue-on-error: true

  validate-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for required files
        run: |
          echo "Checking for required files..."
          required_files=(
            "README.md"
            "CURRICULUM.md"
            "CONTRIBUTING.md"
            "LICENSE"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file $file not found"
              exit 1
            else
              echo "✓ Found $file"
            fi
          done

      - name: Check module structure
        run: |
          echo "Validating module structure..."
          for module in lessons/mod-20*; do
            if [ -d "$module" ]; then
              echo "Checking $module"
              # Check for required module files
              if [ ! -f "$module/README.md" ]; then
                echo "WARNING: $module missing README.md"
              fi
              if [ ! -d "$module/lecture-notes" ]; then
                echo "WARNING: $module missing lecture-notes directory"
              fi
              if [ ! -d "$module/exercises" ]; then
                echo "WARNING: $module missing exercises directory"
              fi
            fi
          done

      - name: Check project structure
        run: |
          echo "Validating project structure..."
          for project in projects/project-*; do
            if [ -d "$project" ]; then
              echo "Checking $project"
              # Check for required project files
              if [ ! -f "$project/README.md" ]; then
                echo "WARNING: $project missing README.md"
              fi
              if [ ! -f "$project/requirements.md" ]; then
                echo "WARNING: $project missing requirements.md"
              fi
              if [ ! -d "$project/src" ]; then
                echo "WARNING: $project missing src directory"
              fi
            fi
          done

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-python, validate-yaml, validate-markdown, validate-shell, validate-dockerfiles, check-code-quality, security-scan, validate-structure]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation checks have been completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Python Validation: ${{ needs.validate-python.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- YAML Validation: ${{ needs.validate-yaml.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown Validation: ${{ needs.validate-markdown.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shell Validation: ${{ needs.validate-shell.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile Validation: ${{ needs.validate-dockerfiles.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality Check: ${{ needs.check-code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Structure Validation: ${{ needs.validate-structure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: Some checks are set to continue-on-error for educational purposes." >> $GITHUB_STEP_SUMMARY
